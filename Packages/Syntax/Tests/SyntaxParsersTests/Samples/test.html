<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Syntax Sample</title>
    <style>
      .card { border: 1px solid #ddd; padding: 1rem; }
    </style>
  </head>
  <body>
    <main id="app">
      <section class="card" data-kind="example">
        <h1>Hello, HTML</h1>
        <p>Tree-sitter sample for highlighting.</p>
        <h2>Figures</h2>
        <figure>
          <img src="photo.jpg" alt="A sample photo" />
          <figcaption>Sample photo caption</figcaption>
        </figure>
        <figure>
          <img src="chart.png" alt="A chart" />
          <figcaption>Chart description</figcaption>
        </figure>
        <table>
          <caption>Score summary</caption>
          <tr><th>Name</th><th>Score</th></tr>
          <tr><td>Alice</td><td>90</td></tr>
        </table>
        <button type="button" onclick="alert('ok')">Run</button>
      </section>
    </main>
    <script>
      const user = { id: 1, name: "Alice" };
      console.log(`user:${user.id}:${user.name}`);
    </script>
  </body>
</html>
