<h1>MacのCotEditorが予期せず終了する場合</h1>

<p>CotEditorが特定の手順で繰り返し予期せず終了する場合は、クラッシュログを添えて報告してください。</p>
<ul>
	<li><p><a href="https://github.com/coteditor/CotEditor/issues" rel="external">GitHub Issues</a></p></li>
</ul>
<p>クラッシュログを送るときは、次の情報もあわせて知らせてください。</p>
<ul>
	<li><p>予期しない終了の直前に行っていた操作</p></li>
	<li><p>macOS、CotEditorのバージョンなどの環境情報</p></li>
</ul>
<p>クラッシュログは、予期しない終了の直後に表示されるダイアログから確認できます。</p>
