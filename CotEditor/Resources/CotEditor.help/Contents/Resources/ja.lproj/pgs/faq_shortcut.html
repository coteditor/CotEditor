<h1>MacのCotEditorでキーボードショートカットを変更後、予期しない動作をする場合</h1>

<p>キーボードショートカットを変更したあとに期待どおり動作しない場合は、次のような原因が考えられます。</p>
<ul>
	<li><p>設定したショートカットが、すでにほかのコマンドに割り当てられている。</p></li>
	<li><p>特定の文字キーと修飾キーの組み合わせを入力したときは、コマンドの実行より文字入力が優先される。</p></li>
</ul>
