<h1>MacのCotEditorで解決方法が見つからない場合</h1>

<p>問題の解決方法が見つからない場合は、開発チームへお問い合わせください。「ヘルプ」＞「不具合レポートを作成」と選択すると、環境情報があらかじめ入ったレポートのテンプレートを作成できます。</p>

<p>作成したレポートは、次のいずれかの方法で送ってください。</p>
<ul>
	<li><p><a href="https://github.com/coteditor/CotEditor/issues" rel="external">GitHub Issues</a>に投稿する（推奨）</p></li>
	<li><p>メール（<a href="mailto:coteditor.github@gmail.com">coteditor.github@gmail.com</a>）で送る</p></li>
</ul>

<p>本文は英語または日本語で書いてください。</p>
